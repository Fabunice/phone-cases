<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fabunice Cases</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<style>
body { margin:0; font-family:'Poppins',sans-serif; }
header { position:relative; }
.hero {
  background:url('https://i.ibb.co/vxhX9n3S/50247cd2-0677-4872-9960-b7daf01a0267.jpg') center/cover no-repeat;
  height:90vh; display:flex; align-items:center; justify-content:center;
  color:white; text-align:center;
}
.hero h1 { font-size:2.5rem; }
.btn { padding:10px 20px; background:#000; color:#fff; border:none; cursor:pointer; }
.products { padding:20px; overflow-x:auto; display:flex; gap:15px; }
.card { min-width:200px; border:1px solid #ddd; padding:10px; border-radius:10px; }
.card img { width:100%; border-radius:10px; }
.cart-icon { position:fixed; top:20px; right:20px; background:black; color:white; padding:10px; border-radius:50%; cursor:pointer; }
.cart { position:fixed; right:-100%; top:0; width:300px; height:100%; background:#fff; padding:20px; transition:0.3s; overflow:auto; }
.cart.open { right:0; }
.whatsapp { position:fixed; bottom:20px; right:20px; background:#25D366; color:#fff; padding:15px; border-radius:50%; }
</style>
</head>
<body>

<div class="cart-icon" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="hero">
  <div>
    <h1>The Fabunice Cases</h1>
    <p>Best Seller, Best Prices</p>
    <button class="btn" onclick="scrollToProducts()">Shop Now</button>
  </div>
</div>

<section id="products" class="products">
</section>

<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <ul id="cartItems"></ul>
  <input type="text" id="name" placeholder="Your Name"><br><br>
  <input type="text" id="phone" placeholder="Phone Number"><br><br>
  <button class="btn" onclick="sendOrder()">Send Order</button>
</div>

<a class="whatsapp" href="https://wa.me/9999999999">💬</a>

<script>
emailjs.init("YOUR_PUBLIC_KEY");

const products = [
  {name:"Premium Case", price:299, img:"https://i.ibb.co/9QMFstt/Screenshot-2026-03-10-18-32-13-61-ead645da7e337d9a49ad71f9cf02576d.jpg"},
  {name:"Premium Case", price:299, img:"https://i.ibb.co/9QMFstt/Screenshot-2026-03-10-18-32-13-61-ead645da7e337d9a49ad71f9cf02576d.jpg"}
];

const cart = [];

function loadProducts(){
  const container = document.getElementById('products');
  products.forEach((p,i)=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button class="btn" onclick="addToCart(${i})">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart(i){
  cart.push(products[i]);
  document.getElementById('count').innerText = cart.length;
  renderCart();
}

function renderCart(){
  const list = document.getElementById('cartItems');
  list.innerHTML = '';
  cart.forEach(item=>{
    list.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
  });
}

function toggleCart(){
  document.getElementById('cart').classList.toggle('open');
}

function scrollToProducts(){
  document.getElementById('products').scrollIntoView({behavior:'smooth'});
}

function sendOrder(){
  const name = document.getElementById('name').value;
  const phone = document.getElementById('phone').value;

  let items = cart.map(i=>i.name + ' ₹' + i.price).join(', ');

  emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
    customer_name:name,
    customer_phone:phone,
    order:items,
    to_email:"fudojiyt@gmail.com"
  }).then(()=>{
    alert("Order Sent!");
  });
}

loadProducts();
</script>

</body>
</html>
